<!DOCTYPE html> <!-- Declares the document type as HTML5 -->
<html lang="en"> <!-- Root element of the HTML document with language set to English -->
<head> <!-- Container for page metadata, character sets, and page title -->
<meta charset="UTF-8"> <!-- Specifies the character encoding of the document as UTF-8 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Ensures the page is responsive on mobile screens -->
<title>Portfolio Maker</title> <!-- The text that will appear on the browser tab -->
<link rel="stylesheet" href="style.css"> <!-- Links the external CSS style sheet file to style the webpage -->
</head> <!-- End of the head section of the HTML document -->
<body> <!-- Starting container for all the visible webpage contents -->
<h1>Portfolio Maker</h1> <!-- Main header at the top of the webpage -->
<form id="portfolioForm"> <!-- Opening tag of the form containing all input fields for the portfolio -->
<div class="section"> <!-- Container wrapper for the Personal Info section layout and styling -->
<h2>Personal Info</h2> <!-- Heading for the Personal Info section of the form -->
<p> <!-- Paragraph wrapper containing the Full Name label and input field -->
<label for="fullName">Full Name:</label> <!-- Label explaining that the next text input is for the Full Name -->
<input type="text" id="fullName" name="fullName"> <!-- Text input field to enter the user's Full Name -->
</p> <!-- Closing paragraph tag for the Full Name element -->
<p> <!-- Paragraph wrapper containing the Job Role label and input field -->
<label for="jobRole">Job Role:</label> <!-- Label explaining that the next text input is for the Job Role -->
<input type="text" id="jobRole" name="jobRole"> <!-- Text input field to enter the user's Job Role -->
</p> <!-- Closing paragraph tag for the Job Role element -->
<div class="row"> <!-- Container using flexbox to display Email and Phone side-by-side in two columns -->
<p> <!-- Paragraph wrapper containing the Email label and input field -->
<label for="email">Email:</label> <!-- Label explaining that the next input is for the Email address -->
<input type="email" id="email" name="email"> <!-- Email input field that checks for valid email syntax -->
</p> <!-- Closing paragraph tag for the Email element -->
<p> <!-- Paragraph wrapper containing the Phone label and input field -->
<label for="phone">Phone:</label> <!-- Label explaining that the next input is for the Phone number -->
<input type="text" id="phone" name="phone"> <!-- Text input field to enter the user's Phone number -->
</p> <!-- Closing paragraph tag for the Phone element -->
</div> <!-- Closing container tag for the Email and Phone two-column flex row -->
<p> <!-- Paragraph wrapper containing the City label and input field -->
<label for="city">City:</label> <!-- Label explaining that the next input is for the City -->
<input type="text" id="city" name="city"> <!-- Text input field to enter the user's current City -->
</p> <!-- Closing paragraph tag for the City element -->
<div class="row"> <!-- Container using flexbox to display LinkedIn and GitHub URLs side-by-side in two columns -->
<p> <!-- Paragraph wrapper containing the LinkedIn URL label and input field -->
<label for="linkedinUrl">LinkedIn URL:</label> <!-- Label explaining that the next input is for the LinkedIn profile URL -->
<input type="text" id="linkedinUrl" name="linkedinUrl"> <!-- Text input field to enter the user's LinkedIn URL -->
</p> <!-- Closing paragraph tag for the LinkedIn URL element -->
<p> <!-- Paragraph wrapper containing the GitHub URL label and input field -->
<label for="githubUrl">GitHub URL:</label> <!-- Label explaining that the next input is for the GitHub profile URL -->
<input type="text" id="githubUrl" name="githubUrl"> <!-- Text input field to enter the user's GitHub URL -->
</p> <!-- Closing paragraph tag for the GitHub URL element -->
</div> <!-- Closing container tag for the URLs two-column flex row -->
</div> <!-- Closing container wrapper for the Personal Info section -->
<div class="section"> <!-- Container wrapper for the About Me section layout and styling -->
<h2>About Me</h2> <!-- Heading for the About Me section of the form -->
<p> <!-- Paragraph wrapper containing the About Me label and textarea -->
<label for="aboutMe">About Me:</label> <!-- Label explaining that the next textarea is for the About Me summary -->
<textarea id="aboutMe" name="aboutMe" rows="4" cols="50"></textarea> <!-- Textarea field where user writes a summary about themselves -->
</p> <!-- Closing paragraph tag for the About Me element -->
</div> <!-- Closing container wrapper for the About Me section -->
<div class="section"> <!-- Container wrapper for the Education section layout and styling -->
<h2>Education</h2> <!-- Heading for the Education section of the form -->
<p> <!-- Paragraph wrapper containing the Degree name label and input field -->
<label for="degree">Degree Name:</label> <!-- Label explaining that the next input is for the Degree Name -->
<input type="text" id="degree" name="degree"> <!-- Text input field to enter the user's Degree Name -->
</p> <!-- Closing paragraph tag for the Degree name element -->
<p> <!-- Paragraph wrapper containing the College name label and input field -->
<label for="college">College Name:</label> <!-- Label explaining that the next input is for the College Name -->
<input type="text" id="college" name="college"> <!-- Text input field to enter the user's College Name -->
</p> <!-- Closing paragraph tag for the College name element -->
<div class="row"> <!-- Container using flexbox to display passing year and CGPA side-by-side in two columns -->
<p> <!-- Paragraph wrapper containing the Year of passing label and input field -->
<label for="passingYear">Year of Passing:</label> <!-- Label explaining that the next input is for the Year of Passing -->
<input type="text" id="passingYear" name="passingYear"> <!-- Text input field to enter the Year of Passing -->
</p> <!-- Closing paragraph tag for the Year of passing element -->
<p> <!-- Paragraph wrapper containing the CGPA or Percentage label and input field -->
<label for="cgpaOrPercentage">CGPA or Percentage:</label> <!-- Label explaining that the next input is for the CGPA or Percentage -->
<input type="text" id="cgpaOrPercentage" name="cgpaOrPercentage"> <!-- Text input field to enter CGPA or Percentage -->
</p> <!-- Closing paragraph tag for the CGPA or Percentage element -->
</div> <!-- Closing container tag for the education two-column flex row -->
</div> <!-- Closing container wrapper for the Education section -->
<div class="section"> <!-- Container wrapper for the Skills section layout and styling -->
<h2>Skills</h2> <!-- Heading for the Skills section of the form -->
<p> <!-- Paragraph wrapper containing the Skills label, instructions, and input field -->
<label for="skills">Skills (separated by commas, e.g. HTML, CSS, JavaScript):</label> <!-- Label explaining the comma-separated format for skills -->
<input type="text" id="skills" name="skills"> <!-- Text input field to enter skills separated by commas -->
</p> <!-- Closing paragraph tag for the Skills element -->
</div> <!-- Closing container wrapper for the Skills section -->
<div class="section"> <!-- Container wrapper for the Projects section layout and styling -->
<h2>Projects</h2> <!-- Heading for the Projects section of the form -->
<p> <!-- Paragraph wrapper containing Project 1 Title label and input field -->
<label for="project1Title">Project 1 Title:</label> <!-- Label explaining that the next input is for the title of the first project -->
<input type="text" id="project1Title" name="project1Title"> <!-- Text input field for Project 1 Title -->
</p> <!-- Closing paragraph tag for Project 1 Title -->
<p> <!-- Paragraph wrapper containing Project 1 Description label and textarea -->
<label for="project1Desc">Project 1 Description:</label> <!-- Label explaining that the next textarea is for the description of the first project -->
<textarea id="project1Desc" name="project1Desc" rows="3" cols="50"></textarea> <!-- Textarea field for entering Project 1 Description -->
</p> <!-- Closing paragraph tag for Project 1 Description -->
<p> <!-- Paragraph wrapper containing Project 2 Title label and input field -->
<label for="project2Title">Project 2 Title:</label> <!-- Label explaining that the next input is for the title of the second project -->
<input type="text" id="project2Title" name="project2Title"> <!-- Text input field for Project 2 Title -->
</p> <!-- Closing paragraph tag for Project 2 Title -->
<p> <!-- Paragraph wrapper containing Project 2 Description label and textarea -->
<label for="project2Desc">Project 2 Description:</label> <!-- Label explaining that the next textarea is for the description of the second project -->
<textarea id="project2Desc" name="project2Desc" rows="3" cols="50"></textarea> <!-- Textarea field for entering Project 2 Description -->
</p> <!-- Closing paragraph tag for Project 2 Description -->
<p> <!-- Paragraph wrapper containing Project 3 Title label and input field -->
<label for="project3Title">Project 3 Title:</label> <!-- Label explaining that the next input is for the title of the third project -->
<input type="text" id="project3Title" name="project3Title"> <!-- Text input field for Project 3 Title -->
</p> <!-- Closing paragraph tag for Project 3 Title -->
<p> <!-- Paragraph wrapper containing Project 3 Description label and textarea -->
<label for="project3Desc">Project 3 Description:</label> <!-- Label explaining that the next textarea is for the description of the third project -->
<textarea id="project3Desc" name="project3Desc" rows="3" cols="50"></textarea> <!-- Textarea field for entering Project 3 Description -->
</p> <!-- Closing paragraph tag for Project 3 Description -->
</div> <!-- Closing container wrapper for the Projects section -->
<div class="section"> <!-- Container wrapper for the Experience section layout and styling -->
<h2>Experience</h2> <!-- Heading for the Experience section of the form -->
<p> <!-- Paragraph wrapper containing the Company Name label and input field -->
<label for="companyName">Company Name:</label> <!-- Label explaining that the next input is for the Company Name -->
<input type="text" id="companyName" name="companyName"> <!-- Text input field to enter the Company Name -->
</p> <!-- Closing paragraph tag for the Company Name element -->
<div class="row"> <!-- Container using flexbox to display Role and Duration side-by-side in two columns -->
<p> <!-- Paragraph wrapper containing the Experience Role label and input field -->
<label for="experienceRole">Role:</label> <!-- Label explaining that the next input is for the job Role in that experience -->
<input type="text" id="experienceRole" name="experienceRole"> <!-- Text input field to enter the Role -->
</p> <!-- Closing paragraph tag for the Experience Role element -->
<p> <!-- Paragraph wrapper containing the Experience Duration label and input field -->
<label for="experienceDuration">Duration:</label> <!-- Label explaining that the next input is for the Duration of the experience -->
<input type="text" id="experienceDuration" name="experienceDuration"> <!-- Text input field to enter the Duration -->
</p> <!-- Closing paragraph tag for the Experience Duration element -->
</div> <!-- Closing container tag for the experience details two-column flex row -->
<p> <!-- Paragraph wrapper containing the Work Done label and textarea -->
<label for="workDone">Work Done:</label> <!-- Label explaining that the next textarea is for describing the work done -->
<textarea id="workDone" name="workDone" rows="4" cols="50"></textarea> <!-- Textarea field to describe the work done -->
</p> <!-- Closing paragraph tag for the Work Done element -->
</div> <!-- Closing container wrapper for the Experience section -->
<div class="section"> <!-- Container wrapper for the Certifications section layout and styling -->
<h2>Certifications</h2> <!-- Heading for the Certifications section of the form -->
<p> <!-- Paragraph wrapper containing the Certifications label and textarea -->
<label for="certifications">Certifications (one per line):</label> <!-- Label explaining that certifications should be entered one per line -->
<textarea id="certifications" name="certifications" rows="4" cols="50"></textarea> <!-- Textarea field to type certifications one per line -->
</p> <!-- Closing paragraph tag for the Certifications element -->
</div> <!-- Closing container wrapper for the Certifications section -->
</form> <!-- Closing tag of the form containing all input fields for the portfolio -->
<div class="row"> <!-- Container using flexbox to display preview and download buttons side-by-side in two columns -->
<p> <!-- Paragraph wrapper containing the Preview Portfolio button -->
<button id="previewBtn">Preview Portfolio</button> <!-- Button to trigger previewing the generated portfolio -->
</p> <!-- Closing paragraph tag for the preview button -->
<p> <!-- Paragraph wrapper containing the Download button -->
<button id="downloadBtn">Download as HTML File</button> <!-- Button to trigger downloading the portfolio as an HTML file -->
</p> <!-- Closing paragraph tag for the download button -->
</div> <!-- Closing container tag for the buttons two-column flex row -->
<div id="preview"></div> <!-- Empty container div where the generated portfolio preview will be rendered -->
<script src="script.js"></script> <!-- Link to the external JavaScript file containing form handlers -->
</body> <!-- Ending container tag for the visible webpage body content -->
</html>
