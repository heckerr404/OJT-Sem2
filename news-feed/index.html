<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live News Feed</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="../topbar.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- TOP BAR: Back + Theme Toggle -->
  <div id="top-bar">
    <a href="../index.html" id="back-btn">&#8592; Back</a>
    <button id="theme-btn" onclick="toggleTheme()">&#9790; Dark</button>
  </div>

  <h1>Live News Feed</h1>

  <!-- CATEGORY FILTERS -->
  <div id="categories">
    <button class="cat-btn active" onclick="loadCategory('technology', this)">Technology</button>
    <button class="cat-btn" onclick="loadCategory('general', this)">General</button>
    <button class="cat-btn" onclick="loadCategory('sports', this)">Sports</button>
    <button class="cat-btn" onclick="loadCategory('business', this)">Business</button>
    <button class="cat-btn" onclick="loadCategory('entertainment', this)">Entertainment</button>
  </div>

  <!-- LOADING SPINNER -->
  <div id="spinner"></div>

  <!-- ERROR MESSAGE -->
  <p id="error-msg"></p>

  <!-- NEWS GRID -->
  <div id="news-grid"></div>

  <script src="../theme.js"></script>
  <script src="script.js"></script>
</body>
</html>
